<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan to Explore: The Lilac Dress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
        }
        .qr-container {
            box-shadow: 0 20px 50px rgba(168, 85, 247, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-[3rem] p-10 qr-container border-4 border-purple-100 text-center">
        <div class="mb-8">
            <div class="w-16 h-16 bg-purple-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6 shadow-lg rotate-3">
                <i data-lucide="smartphone" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tighter mb-2">The Lilac Dress</h1>
            <p class="text-slate-500 font-medium">Scan to experience the interactive story</p>
        </div>

        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-purple-600 to-fuchsia-500 rounded-3xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
            <div class="relative bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm">
                <!-- Placeholder for QR Code - In a real scenario, replace with an actual QR image -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://tonydcapps.github.io/Narrative/comicStrip.html" alt="QR Code" class="w-full h-auto rounded-xl">
            </div>
        </div>

        <div class="mt-10 space-y-4">
            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Scan with Camera</p>
            <div class="flex justify-center gap-4">
                <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400"><i data-lucide="apple" class="w-5 h-5"></i></div>
                <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400"><i data-lucide="play" class="w-5 h-5"></i></div>
            </div>
        </div>

        <div class="mt-12 pt-8 border-t border-slate-100">
            <a href="index.html" class="text-purple-600 hover:text-purple-800 font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Experience
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
